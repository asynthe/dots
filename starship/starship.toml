# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

right_format = "гҖҚгҒ«гӮғ~(white)"
continuation_prompt = "в–¶в–¶"

[username]
disabled = false
#style_user = "bg:#9A348E"
#style_root = "bg:#9A348E"
format = '[$user ](#0099ff)'
show_always = true

[hostname]
disabled = false
ssh_only = false
format = 'on [$hostname](#ff3399) '
trim_at = "."

[directory]
disabled = false
#style = "bg:#DA627D"
format = "in [$path]($style) "
truncation_length = 3
truncation_symbol = "вҖҰ/"
read_only = "п Ҫ"
[directory.substitutions]
".config"="оҳ•"
"main/sync"="п‘Ә"
"music" = "пҖҒ"
"Downloads" = "пӣҷ"

[cmd_duration]
disabled = true
min_time = 4
show_milliseconds = false
style = 'bold italic red'

# Inserts a blank line between shell prompts
add_newline = true

# if false, two lines
[line_break]
disabled = true

[character]
success_symbol = "[ гҖҢ](white)"
#success_symbol = "[>Пү<гҖңвҳҶ](bold green)"
error_symbol = "[ >п№Ҹ< гҖҢ](bold red)"
#error_symbol = "[гғҺ_<](bold red)"

# Disable the package module, hiding it from the prompt completely
[package]
disabled = false
symbol = "пЈ– "

