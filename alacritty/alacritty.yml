window:
  opacity: 0.4
  padding:
    x: 20
    y: 15
  class:
    instance: Alacritty
    general: Alacritty

scrolling:
  history: 10000
  multiplier: 3

font:
  size: 12
  normal:
    #family: CyberpunkWaifus
    #family: CozetteVector
    family: FiraCode Nerd Font Mono
    #family: Hack Nerd Font Mono
    #family: JetBrainsMono Nerd Font
    style: Regular
  #style: Medium
  bold:
    #family: CyberpunkWaifus
    family: FiraCode Nerd Font Mono
    #family: Hack Nerd Font Mono
    #family: JetBrainsMono Nerd Font
    style: Bold
  italic:
    #family: CyberpunkWaifus
    family: FiraCode Nerd Font Mono
    #family: Hack Nerd Font Mono
    #family: JetBrainsMono Nerd Font
  style: Italic
  bold_italic:
    #family: CyberpunkWaifus
    family: FiraCode Nerd Font Mono
    #family: Hack Nerd Font Mono
    #family: JetBrainsMono Nerd Font
  style: Bold Italic

cursor:
  style:
    shape: Underline
    blinking: Always
    blink-interval: 700

shell:
  program: /bin/zsh

# Colors (Hyper)
colors:
  # Default colors
  primary:
    background: '0x000000'
    foreground: '0xffffff'
  cursor:
    text: '0xF81CE5'
    cursor: '0xffffff'

  # Normal colors
  normal:
    black:   '0x000000'
    red:     '0xfe0100'
    green:   '0x33ff00'
    yellow:  '0xfeff00'
    blue:    '0x0066ff'
    magenta: '0xcc00ff'
    cyan:    '0x00ffff'
    white:   '0xd0d0d0'

  # Bright colors
  bright:
    black:   '0x808080'
    red:     '0xfe0100'
    green:   '0x33ff00'
    yellow:  '0xfeff00'
    blue:    '0x0066ff'
    magenta: '0xcc00ff'
    cyan:    '0x00ffff'
    white:   '0xFFFFFF'
